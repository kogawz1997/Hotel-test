name: 🐛 Bug Report
description: Something is broken or doesn't work as expected
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is
      placeholder: When I click the AI suggest button, it returns an error...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can someone else see the bug?
      placeholder: |
        1. Go to '/dashboard/inbox'
        2. Open a conversation
        3. Click the ✨ icon
        4. Error appears
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: AI should generate a suggested reply

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / video
      description: If applicable, drag images or video here

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: Chrome 122 on macOS 14

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.1.0 or commit hash

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Console errors, server logs, etc.
      render: shell

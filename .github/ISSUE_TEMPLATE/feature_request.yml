name: 💡 Feature Request
description: Suggest an idea or improvement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What pain point are you experiencing? Who is affected?
      placeholder: Front desk staff have to manually copy guest info from booking confirmation emails into the PMS, which takes 5+ minutes per booking...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
      placeholder: Auto-parse booking confirmations from email and create reservation drafts that staff can review and confirm.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about

  - type: dropdown
    id: priority
    attributes:
      label: Priority for your hotel
      options:
        - Nice to have
        - Important
        - Critical (blocking us from using Maitri)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Hotel size, type, location, etc.
